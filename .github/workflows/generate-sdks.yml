name: Generate SDKs

on:
  push:
    paths:
      - "contracts/**/*.yml"
      - "contracts/**/*.yaml"
      - "scripts/generate_sdks.rb"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate SDKs
        run: ruby scripts/generate_sdks.rb

      - name: Commit generated sources
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add BusinessSDK android
            git commit -m "chore: regenerate SDKs from contracts"
            git push
          fi
