name: Generate SDKs

on:
  push:
    paths:
      - "contracts/**/*.yml"
      - "contracts/**/*.yaml"
      - "scripts/generate_sdks.rb"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  generate:
    runs-on: macos-latest

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🏷️ Resolve package version"
        id: version
        run: |
          RAW_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SANITIZED="$(echo "$RAW_REF" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')"
          echo "sdk_version=$SANITIZED" >> "$GITHUB_OUTPUT"

      - name: "🧾 Detect changed contracts"
        id: changes
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi
          CHANGED="$(git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" -- 'contracts/**/*.yml' 'contracts/**/*.yaml' || true)"
          {
            echo "changed_contracts<<EOF"
            if [[ -n "$CHANGED" ]]; then
              echo "$CHANGED"
            else
              echo "(no contract file diff detected)"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "⚙️ Generate SDKs and docs"
        run: ruby scripts/generate_sdks.rb

      - name: "🧰 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: "🛠️ Generate Gradle wrapper"
        working-directory: android
        run: gradle wrapper --gradle-version 8.10.2

      - name: "📦 Publish Android GitHub package"
        working-directory: android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SDK_VERSION: ${{ steps.version.outputs.sdk_version }}
        run: ./gradlew publish

      - name: "📝 Publish workflow summary"
        run: |
          CONTRACT_DETAILS="$(ruby <<'RUBY'
          require "yaml"

          changed = <<~TEXT
          ${{ steps.changes.outputs.changed_contracts }}
          TEXT

          files = changed.lines.map(&:strip).reject { |line| line.empty? || line == "(no contract file diff detected)" }

          if files.empty?
            puts "- _(No contract metadata available for this run)_"
            exit
          end

          files.each do |file|
            next unless File.exist?(file)

            contract = YAML.load_file(file)
            client_name = "#{contract.fetch("swift_module")}Client"

            puts "### #{contract.fetch("name")}"
            puts "- 📄 Contract: `#{file}`"
            puts "- 🍎 Swift module: `#{contract.fetch("swift_module")}`"
            puts "- 🤖 Android module: `#{contract.fetch("android_module")}`"
            puts "- 🧩 Client API: `#{client_name}`"

            contract.fetch("repositories", []).each do |repository|
              puts "- 📚 Repository: `#{repository.fetch("name")}`"
              repository.fetch("methods", []).each do |method|
                puts "  - `#{method.fetch("method")} #{method.fetch("path")}` -> `#{method.fetch("name")}`"
              end
            end

            puts
          end
          RUBY
          )"

          {
            echo "# 📦 Contract generation summary"
            echo
            echo "## 🧾 Changed contracts"
            echo '${{ steps.changes.outputs.changed_contracts }}'
            echo
            echo "## 🧠 Generated APIs"
            echo "$CONTRACT_DETAILS"
            echo
            echo "## 🏗️ Generated outputs"
            echo "- 🍎 Swift package: \`BusinessSDK/\`"
            echo "- 🤖 Android modules: \`android/\`"
            echo "- 🏷️ Branch package version: \`${{ steps.version.outputs.sdk_version }}\`"
            echo "- 📦 Android GitHub package: \`com.multiplatformbusinesssdk:business-sdk-android:${{ steps.version.outputs.sdk_version }}\`"
            echo "- 📚 Documentation: \`docs/generated/SDK_CATALOG.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "🚀 Commit generated sources"
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Package.swift BusinessSDK android docs
            git commit -m "✨ regenerate SDKs from contracts"
            git push
          fi
