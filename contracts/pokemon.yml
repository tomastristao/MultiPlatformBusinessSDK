name: PokemonSDK
swift_module: PokemonSDK
android_module: pokemon-sdk
android_package: com.multiplatformbusinesssdk.pokemon
base_url: https://pokeapi.co/api/v2
default_headers:
  Accept: application/json
repositories:
  - name: PokemonRepository
    methods:
      - name: fetchPokemonList
        method: GET
        path: /pokemon
        response: PokemonListResponse
        query_params:
          - name: limit
            type: Int
            default: 20
          - name: offset
            type: Int
            default: 0
      - name: fetchPokemonDetail
        method: GET
        path: /pokemon/{name}
        response: PokemonDetailResponse
        path_params:
          - name: name
            type: String
models:
  - name: PokemonListResponse
    fields:
      - name: count
        type: Int
      - name: results
        type: "[PokemonEntry]"
  - name: PokemonEntry
    fields:
      - name: name
        type: String
      - name: url
        type: String
  - name: PokemonDetailResponse
    fields:
      - name: id
        type: Int
      - name: name
        type: String
      - name: height
        type: Int
      - name: weight
        type: Int
